# ===== 基本 =====

# プレフィックスを C-o に変更
# (C-b は Emacs/readline の backward-char と衝突するため。
#  C-o の open-line / operate-and-get-next はほぼ使わない前提)
set -g prefix C-o
unbind C-b
bind C-o send-prefix

# キー入力の待ち時間をなくす (Emacs の Meta / vi の Esc の反応を良くする)
set -sg escape-time 0

# スクロールバックの履歴行数
set -g history-limit 50000

# マウス操作を有効化 (ペイン選択・リサイズ・スクロール)
set -g mouse on

# ウィンドウ/ペイン番号を 1 始まりにし、閉じたら詰める
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# focus-events (tmux 内の Emacs の auto-revert 等を効かせる)
set -g focus-events on

# 同一セッションを複数クライアントで開いたときのリサイズ最適化
setw -g aggressive-resize on

# コピーモードのキーバインドは emacs (tmux デフォルト) のまま

# ===== 端末・カラー =====

# True Color (24bit) を有効化 (iTerm2 向け)
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:RGB"

# ===== クリップボード =====

# コピー内容を OSC52 経由でシステムクリップボードへ連携
set -g set-clipboard on

# ===== キーバインド =====

# 設定リロード
bind r source-file ~/.tmux.conf \; display "reloaded"

# ペイン分割 (| 縦 / - 横) と新規ウィンドウは現在のディレクトリを引き継ぐ
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ペイン移動 (prefix + hjkl)。矢印キー (prefix + 矢印) もデフォルトで使える
# 注: prefix l を上書きするため last-window は prefix n / prefix p で代替
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ペインリサイズ (prefix + HJKL、-r で prefix 押し直しなしに連打可)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ===== 見た目・通知 =====

# アクティブペインのボーダーを強調
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour244

# ステータスバー上で選択中のウィンドウを強調 (濃い背景 + 白系文字)
setw -g window-status-current-style fg=colour255,bg=colour238,bold

# バックグラウンドのウィンドウ出力を通知 (ベルは鳴らさない)
setw -g monitor-activity on
set -g visual-activity off
